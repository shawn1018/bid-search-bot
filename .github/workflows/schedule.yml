name: 每日標案自動搜尋推播

on:
  schedule:
    # 這是設定時間的地方 (使用 UTC 時間，台灣時間減 8 小時)
    # 例如：台灣時間每天早上 9:00 執行 = UTC 時間 1:00
    # 下面這行代表：每天 UTC 1:00 (台灣早上 09:00) 執行一次
    - cron: '0 1 * * *'
    
  # 這個設定讓你可以隨時手動點擊按鈕來測試機器人
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    steps:
      - name: 取得程式碼
        uses: actions/checkout@v3

      - name: 設定 Python 環境
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: 安裝套件
        run: pip install -r requirements.txt

      - name: 執行搜尋與 LINE 發送
        env:
          # 從 GitHub 保險箱把金鑰拿出來給 Python 用
          LINE_TOKEN: ${{ secrets.LINE_TOKEN }}
          USER_ID: ${{ secrets.USER_ID }}
        run: python auto_run.py
